function deepClone(o){return JSON.parse(JSON.stringify(o));}
// Ensures saved config is compatible with current app version
function migrate(cl){
  const u=deepClone(cl);
  LOCS.forEach(function(l){
    if(!u[l]) u[l]={};
    if(!u[l]._sections) u[l]._sections=deepClone(STRUCTURE[l]);
    u[l]._sections.forEach(function(sc){
      if(!u[l][sc]) u[l][sc]={};
      if(!u[l][sc]._enabled) u[l][sc]._enabled=deepClone(DEFAULT_ENABLED);
      SHIFTS.forEach(function(sh){
        if(!u[l][sc][sh]) u[l][sc][sh]=[];
        u[l][sc][sh]=u[l][sc][sh].map(function(t){return typeof t==="string"?{text:t,requiresPhoto:false}:t;});
        if(u[l][sc]._enabled[sh]===undefined) u[l][sc]._enabled[sh]=DEFAULT_ENABLED[sh]||false;
      });
    });
  });
  return u;
}

  const data=await res.json();

// CSV export
function toCSV(rows){
  const h=["ID","Submitted At","Name","Location","Section","Shift","Completed","Total","Tasks"];
  const lines=rows.map(function(r){return[r.id,r.created_at,r.name,r.location,r.section,r.shift,r.completed,r.total,JSON.stringify(r.tasks)].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(",");});
  return[h.join(",")].concat(lines).join("\n");
}
function downloadCSV(rows){
  const blob=new Blob([toCSV(rows)],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="checklist_logs_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  URL.revokeObjectURL(url);
}

function ResultsView(p){
  const [filterLoc,setFilterLoc]=useState("All");
  const [filterShift,setFilterShift]=useState("All");
  const [filterDate,setFilterDate]=useState("All");
  const dateOpts=["All","Today","Last 7 days","Last 30 days"];
  function withinDate(log){
    if(filterDate==="All") return true;
    const d=new Date(log.created_at),now=new Date();
    if(filterDate==="Today") return d.toDateString()===now.toDateString();
    if(filterDate==="Last 7 days") return (now-d)<7*86400000;
    if(filterDate==="Last 30 days") return (now-d)<30*86400000;
    return true;
  }
  const filtered=p.logs.filter(function(l){return(filterLoc==="All"||l.location===filterLoc)&&(filterShift==="All"||l.shift===filterShift)&&withinDate(l);});
  const total=filtered.length;
  const fullyComplete=filtered.filter(function(l){return l.completed===l.total;}).length;
  const incomplete=total-fullyComplete;
  const compRate=total?Math.round(fullyComplete/total*100):0;
  const bySec={};
  filtered.forEach(function(l){const k=l.location+" · "+l.section;if(!bySec[k])bySec[k]={done:0,total:0};bySec[k].total++;if(l.completed===l.total)bySec[k].done++;});
  const missedTasks={};

function App(){

              <button style={logs.length>0?Object.assign({},st.btnDanger,{marginLeft:"auto"}):Object.assign({},st.btnDanger,{marginLeft:"auto",opacity:.4,cursor:"not-allowed"})} disabled={logs.length===0||deleting} onClick={handleDeleteAll}>Delete all</button>
            </div>

            {logsLoading?<p style={{fontSize:".875rem",color:"#b8c8a8",textAlign:"center",padding:"3rem 0"}}>Loading…</p>
            :logsErr?<p style={{fontSize:".875rem",color:"#e07858",textAlign:"center",padding:"3rem 0"}}>Failed to load. Check connection.</p>
            :logs.length===0?<p style={{fontSize:".875rem",color:"#b8c8a8",textAlign:"center",padding:"3rem 0"}}>No submissions yet.</p>
            :logs.map(function(log){
              const isSelected=selectedIds.indexOf(log.id)>=0;
              return(
                <div key={log.id} style={Object.assign({},st.logCard,isSelected?st.logCardSelected:{})}>
                  {selectMode?React.createElement("input",{type:"checkbox",style:st.checkbox,checked:isSelected,onChange:function(){toggleSelect(log.id);}}):null}
                  <div style={{flex:"1",cursor:"pointer"}} onClick={function(){selectMode?toggleSelect(log.id):setExpanded(expanded===log.id?null:log.id);}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                      <div>
                        <p style={{fontWeight:"500",fontSize:".875rem",color:"#e8f5e0"}}>{log.name}</p>
                        <p style={{fontSize:".7rem",color:"#b8c8a8",marginTop:".2rem"}}>{log.location} · {log.section} · {log.shift}</p>
                      </div>
                      <div style={{textAlign:"right",flexShrink:"0",marginLeft:"1rem"}}>
                        <p style={{fontSize:".7rem",color:"#b8c8a8"}}>{new Date(log.created_at).toLocaleString("en-AU",{dateStyle:"short",timeStyle:"short"})}</p>
                        <p style={{fontSize:".7rem",fontWeight:"500",marginTop:".2rem",color:log.completed===log.total?"#7ad86a":"#d4a860"}}>{log.completed}/{log.total}</p>
                      </div>
                    </div>
                    {!selectMode&&expanded===log.id?(
                      <div style={st.logExpand}>
                        {(log.tasks||[]).map(function(t,i){return(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:".5rem",fontSize:".75rem",marginBottom:".375rem",color:t.done?"#5a8050":"#d4a860"}}>
                            <span>{t.done?"✓":"○"}</span>
                            <span style={t.done?{textDecoration:"line-through"}:{}}>{t.task}</span>
                            {t.photoUrl?<a href={t.photoUrl} target="_blank" rel="noreferrer" style={{color:"#7ab898",marginLeft:"auto",flexShrink:"0"}}>📷 view</a>:null}
                          </div>
                        );})}
                      </div>
                    ):null}
                  </div>
                </div>
              );
            })}
          </div>
        ):null}

        {adminTab==="edit"?(
          <div>
            <p style={{fontSize:".7rem",color:"#b8c8a8",marginBottom:"1rem"}}>Tap 📷 on a task to require a photo. Changes save instantly to all devices.{configSaving?" Saving…":""}</p>
            <div style={st.chipRow}>{LOCS.map(function(l){return <Chip key={l} label={l} active={eLoc===l} onClick={function(){setELoc(l);const secs=getSections(l);setESec(secs.length>0?secs[0]:"");setNewSecName("");}}/>; })}</div>

            
            <div style={{marginBottom:".75rem"}}>
              <p style={{fontSize:".65rem",letterSpacing:".12em",textTransform:"uppercase",color:"#b8c8a8",marginBottom:".5rem"}}>Sections</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:".375rem",marginBottom:".5rem"}}>
                {eSections.map(function(sc){
                  return React.createElement("div",{key:sc,style:{display:"flex",alignItems:"center",gap:"0",border:"1px solid "+(eSec===sc?"#c8ddb8":"#1e2e1e"),borderRadius:".5rem",overflow:"hidden"}},
                    React.createElement("button",{style:{padding:".375rem .625rem",fontSize:".75rem",fontWeight:"500",background:eSec===sc?"#c8ddb8":"#101810",color:eSec===sc?"#0a130a":"#4d6848",cursor:"pointer",border:"none"},onClick:function(){setESec(sc);}},sc),
                    eSections.length>1?React.createElement("button",{style:{padding:".375rem .375rem",fontSize:".7rem",background:eSec===sc?"#c8ddb8":"#101810",color:eSec===sc?"#3a6030":"#263826",cursor:"pointer",border:"none",borderLeft:"1px solid "+(eSec===sc?"#a0c898":"#1e2e1e")},onClick:function(e){e.stopPropagation();removeSection(eLoc,sc);}},"×"):null
                  );
                })}
              </div>
              
              <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
                <input style={Object.assign({},st.editInput,{flex:"1",padding:".5rem .75rem",fontSize:".8rem"})} placeholder="New section name…" value={newSecName} onChange={function(e){setNewSecName(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&newSecName.trim()){addSection(eLoc,newSecName);setNewSecName("");}}}/>
                <button style={Object.assign({},st.btnG,{flexShrink:"0"})} onClick={function(){if(newSecName.trim()){addSection(eLoc,newSecName);setNewSecName("");}}}>+ Add</button>
              </div>
            </div>

            
            {eSec?React.createElement("div",{style:{background:"#141414",border:"1px solid #222",borderRadius:".875rem",padding:"1rem",marginBottom:"1rem"}},
              React.createElement("p",{style:{fontSize:".65rem",letterSpacing:".12em",textTransform:"uppercase",color:"#b8c8a8",marginBottom:".75rem"}},"Active Shifts for "+eSec),
              React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:".5rem"}},
                SHIFTS.map(function(sh){
                  const on=eEnabled[sh]!==false;
                  return React.createElement("button",{key:sh,style:{padding:".5rem 1rem",borderRadius:".625rem",fontSize:".8rem",fontWeight:"500",border:"1px solid "+(on?"#c8ddb8":"#263826"),background:on?"#c8ddb8":"transparent",color:on?"#0a130a":"#4d6848",cursor:"pointer"},onClick:function(){toggleShiftEnabled(eLoc,eSec,sh);}},sh);
                })
              )
            ):null}

            {eSec?React.createElement("div",null,
              React.createElement("div",{style:Object.assign({},st.chipRow,{marginBottom:"1rem"})},SHIFTS.map(function(sh){return React.createElement(Chip,{key:sh,label:sh,active:eShift===sh,onClick:function(){setEShift(sh);}});})),
              React.createElement("div",{style:{marginBottom:".75rem"}},
                eTasks.map(function(task,i){return React.createElement(EditTaskRow,{key:i,task:task,idx:i,
                  onUpdateText:function(idx,text){updateTaskText(eLoc,eSec,eShift,idx,text);},
                  onTogglePhoto:function(idx){toggleTaskPhoto(eLoc,eSec,eShift,idx);},
                  onRemove:function(idx){removeTask(eLoc,eSec,eShift,idx);}
                });})
              ),
              React.createElement("button",{style:st.addBtn,onClick:function(){addTask(eLoc,eSec,eShift);}}, "+ Add task")
            ):React.createElement("p",{style:{fontSize:".8rem",color:"#b8c8a8",textAlign:"center",padding:"1rem 0"}},"No sections yet — add one above.")}
          </div>
        ):null}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("sw.js");
    });
  }
</script>
</body>
</html>
