          React.createElement("div",{style:st.statBox},React.createElement("p",{style:{fontSize:"1.75rem",fontWeight:"700",color:"#fff"}},total),React.createElement("p",{style:{fontSize:".7rem",color:"#555",marginTop:".2rem",textTransform:"uppercase",letterSpacing:".08em"}},"Submissions")),
          React.createElement("div",{style:st.statBox},React.createElement("p",{style:{fontSize:"1.75rem",fontWeight:"700",color:"#4ade80"}},compRate+"%"),React.createElement("p",{style:{fontSize:".7rem",color:"#555",marginTop:".2rem",textTransform:"uppercase",letterSpacing:".08em"}},"Completion rate")),
          React.createElement("div",{style:st.statBox},React.createElement("p",{style:{fontSize:"1.75rem",fontWeight:"700",color:incomplete>0?"#f59e0b":"#4ade80"}},incomplete),React.createElement("p",{style:{fontSize:".7rem",color:"#555",marginTop:".2rem",textTransform:"uppercase",letterSpacing:".08em"}},"Incomplete"))
        ),
        React.createElement("span",{style:st.sectionLbl},"Completion by Section"),
        React.createElement("div",{style:{marginBottom:"1.5rem"}},
          Object.entries(bySec).sort(function(a,b){return a[0].localeCompare(b[0]);}).map(function(entry){
            const k=entry[0],v=entry[1],pct=Math.round(v.done/v.total*100),bc=pct===100?"#4ade80":pct>=50?"#f59e0b":"#ef4444";
            return React.createElement("div",{key:k,style:{marginBottom:".75rem"}},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",fontSize:".8rem",marginBottom:".3rem"}},React.createElement("span",{style:{color:"#ccc"}},k),React.createElement("span",{style:{color:bc}},v.done+"/"+v.total+" · "+pct+"%")),
              React.createElement("div",{style:{height:"4px",background:"#1e1e1e",borderRadius:"2px",overflow:"hidden"}},React.createElement("div",{style:{height:"100%",borderRadius:"2px",width:pct+"%",background:bc,transition:"width .4s"}}))
            );
          })
        ),
        topMissed.length>0?React.createElement("div",null,
          React.createElement("span",{style:st.sectionLbl},"Most Missed Tasks"),
          React.createElement("div",{style:{background:"#141414",border:"1px solid #222",borderRadius:".875rem",overflow:"hidden"}},
            topMissed.map(function(entry,i){return React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:".75rem 1rem",borderBottom:i<topMissed.length-1?"1px solid #1e1e1e":"none"}},React.createElement("span",{style:{fontSize:".8rem",color:"#ccc",flex:"1",marginRight:"1rem"}},entry[0]),React.createElement("span",{style:{fontSize:".75rem",fontWeight:"600",color:"#f59e0b",flexShrink:"0"}},entry[1]+"x missed"));})
          )
        ):null
      )
  );
}

function App(){
  const [view,setView]=useState("loading");
  const [name,setName]=useState("");
  const [loc,setLoc]=useState("");
  const [sec,setSec]=useState("");
  const [shift,setShift]=useState("");
  const [tasks,setTasks]=useState([]);
  const [checked,setChecked]=useState([]);
  const [photos,setPhotos]=useState([]);
  const [uploadingIdx,setUploadingIdx]=useState(-1);
  const [photoErr,setPhotoErr]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [submitErr,setSubmitErr]=useState(false);
  const [cls,setCls]=useState(null);
  const [configSaving,setConfigSaving]=useState(false);
  const [logs,setLogs]=useState([]);
  const [logsLoading,setLogsLoading]=useState(false);
  const [logsErr,setLogsErr]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [selectedIds,setSelectedIds]=useState([]);
  const [selectMode,setSelectMode]=useState(false);
  const [adminPw,setAdminPw]=useState("");
  const [adminErr,setAdminErr]=useState(false);
  const [adminTab,setAdminTab]=useState("logs");
  const [eLoc,setELoc]=useState("Kitchen");
  const [eSec,setESec]=useState("Grill");
  const [eShift,setEShift]=useState("Opening");
  const [expanded,setExpanded]=useState(null);

  useEffect(function(){
    sbFetchConfig().then(function(config){setCls(config||deepClone(DT));setView("home");}).catch(function(){setCls(deepClone(DT));setView("home");});
  },[]);

  const saveCls=function(u){setCls(u);setConfigSaving(true);sbSaveConfig(u).finally(function(){setConfigSaving(false);});};
  const fetchLogs=useCallback(async function(){
    setLogsLoading(true);setLogsErr(false);
    try{setLogs(await sbFetchLogs());}catch(e){setLogsErr(true);}
    setLogsLoading(false);
  },[]);
  useEffect(function(){if(view==="admin"&&(adminTab==="logs"||adminTab==="results"))fetchLogs();},[view,adminTab,fetchLogs]);

  // Delete handlers
  const handleDeleteSelected=async function(){
    if(!selectedIds.length) return;
    if(!window.confirm("Delete "+selectedIds.length+" selected submission"+(selectedIds.length!==1?"s":"")+"? This cannot be undone.")) return;
    setDeleting(true);
    try{
      await sbDeleteIds(selectedIds);
      setLogs(function(prev){return prev.filter(function(l){return selectedIds.indexOf(l.id)<0;});});
      setSelectedIds([]);setSelectMode(false);
    }catch(e){alert("Delete failed. Please try again.");}
    setDeleting(false);
  };
  const handleDeleteAll=async function(){
    if(!window.confirm("Delete ALL "+logs.length+" submissions? This cannot be undone.")) return;
    setDeleting(true);
    try{
      await sbDeleteAll();
      setLogs([]);setSelectedIds([]);setSelectMode(false);
    }catch(e){alert("Delete failed. Please try again.");}
    setDeleting(false);
  };
  const toggleSelect=function(id){
    setSelectedIds(function(prev){
      return prev.indexOf(id)>=0?prev.filter(function(x){return x!==id;}):[].concat(prev,[id]);
    });
  };
  const toggleSelectAll=function(){
    setSelectedIds(function(prev){return prev.length===logs.length?[]:[].concat(logs.map(function(l){return l.id;}));});
  };
  const exitSelectMode=function(){setSelectMode(false);setSelectedIds([]);};

  const taskDone=function(i){return checked[i]&&(!tasks[i]||!tasks[i].requiresPhoto||!!photos[i]);};
  const completed=tasks.filter(function(_,i){return taskDone(i);}).length;
  const pct=tasks.length?Math.round(completed/tasks.length*100):0;
  const allDone=tasks.length>0&&completed===tasks.length;
  const unticked=tasks.filter(function(_,i){return !checked[i];}).length;
  const photoNeeded=tasks.filter(function(t,i){return t.requiresPhoto&&checked[i]&&!photos[i];}).length;
  const btnLabel=allDone?"Submit Checklist ✓":unticked>0?unticked+" task"+(unticked!==1?"s":"")+" remaining":photoNeeded+" photo"+(photoNeeded!==1?"s":"")+" required";

  const resetHome=function(){setLoc("");setSec("");setShift("");setName("");setSubmitErr(false);setPhotoErr(false);setView("home");};
  const startChecklist=function(){
    const t=cls[loc]&&cls[loc][sec]&&cls[loc][sec][shift]?cls[loc][sec][shift]:[];
    setTasks(t);setChecked(new Array(t.length).fill(false));setPhotos(new Array(t.length).fill(null));
    setSubmitErr(false);setPhotoErr(false);setView("checklist");
  };
  const toggle=function(i){setChecked(function(prev){return prev.map(function(v,idx){return idx===i?!v:v;});});};
  const handlePhotoUpload=async function(file,idx){
    setUploadingIdx(idx);setPhotoErr(false);
    try{
      const ext=file.name.split(".").pop()||"jpg";
      const path=[Date.now(),loc,sec,shift,idx].join("_").replace(/[^a-zA-Z0-9_]/g,"_")+"."+ext;
      const url=await uploadPhoto(file,path);
      setPhotos(function(prev){return prev.map(function(p,i){return i===idx?url:p;});});
    }catch(e){setPhotoErr(true);}
    setUploadingIdx(-1);
  };
  const submitChecklist=async function(){
    setSubmitting(true);setSubmitErr(false);
    try{
      await sbInsert({name:name.trim(),location:loc,section:sec,shift:shift,completed:completed,total:tasks.length,
        tasks:tasks.map(function(t,i){return{task:t.text,done:checked[i],requiresPhoto:t.requiresPhoto,photoUrl:photos[i]||null};})
      });
      setView("success");
    }catch(e){setSubmitErr(true);}
    setSubmitting(false);
  };
  const tryLogin=function(){
    if(adminPw===ADMIN_PW){setView("admin");setAdminPw("");setAdminErr(false);}else setAdminErr(true);
  };
  const updateTaskText=function(l,sc,sh,i,text){const u=deepClone(cls);u[l][sc][sh][i]=Object.assign({},u[l][sc][sh][i],{text:text});saveCls(u);};
  const toggleTaskPhoto=function(l,sc,sh,i){const u=deepClone(cls);u[l][sc][sh][i]=Object.assign({},u[l][sc][sh][i],{requiresPhoto:!u[l][sc][sh][i].requiresPhoto});saveCls(u);};
  const removeTask=function(l,sc,sh,i){const u=deepClone(cls);u[l][sc][sh].splice(i,1);saveCls(u);};
  const addTask=function(l,sc,sh){const u=deepClone(cls);u[l][sc][sh].push({text:"New task",requiresPhoto:false});saveCls(u);};
  const eSections=cls?(STRUCTURE[eLoc]||[]):[];
  const eTasks=cls&&cls[eLoc]&&cls[eLoc][eSec]&&cls[eLoc][eSec][eShift]?cls[eLoc][eSec][eShift]:[];

  if(view==="loading") return React.createElement("div",{style:Object.assign({},st.page,st.center)},React.createElement("p",{style:{fontSize:".75rem",color:"#444",letterSpacing:".1em",textTransform:"uppercase"}},"Loading…"));

  if(view==="home") return (
    <div style={Object.assign({},st.page,st.center)}>
      <div style={st.card}>
        <p style={st.eyebrow}>Mise</p>
        <h1 style={st.heading}>Section Checklists</h1>
        <div style={st.stack}>
          <div><label style={st.lbl}>Your Name</label><input style={st.field} placeholder="Enter your name" value={name} onChange={function(e){setName(e.target.value);}}/></div>
          <div><label style={st.lbl}>Location</label><div style={st.grid2}>{LOCS.map(function(l){return <Pill key={l} label={l} active={loc===l} onClick={function(){setLoc(l);setSec("");}}/>; })}</div></div>
          {loc?<div><label style={st.lbl}>Section</label><div style={st.grid2}>{STRUCTURE[loc].map(function(sc){return <Pill key={sc} label={sc} active={sec===sc} onClick={function(){setSec(sc);}}/>; })}</div></div>:null}
          {sec?<div><label style={st.lbl}>Shift</label><div style={st.grid2}>{SHIFTS.map(function(sh){return <Pill key={sh} label={sh} active={shift===sh} onClick={function(){setShift(sh);}}/>; })}</div></div>:null}
          <button style={Object.assign({},st.btnP,{opacity:(!name.trim()||!loc||!sec||!shift)?0.25:1})} disabled={!name.trim()||!loc||!sec||!shift} onClick={startChecklist}>Start Checklist →</button>
        </div>
        <button style={st.adminLink} onClick={function(){setView("adminLogin");}}>Admin</button>
      </div>
    </div>
  );

  if(view==="checklist") return (
    <div style={Object.assign({},st.page,st.col)}>
      <div style={st.inner}>
        <button style={st.backBtn} onClick={resetHome}>← Back</button>
        <p style={{fontSize:".7rem",letterSpacing:".1em",textTransform:"uppercase",color:"#555",marginBottom:".3rem"}}>{name} · {loc} · {sec}</p>
        <h2 style={{fontSize:"1.3rem",fontWeight:"600",marginBottom:"1.25rem"}}>{shift} Checklist</h2>
        <div style={st.pctRow}><span>{completed} of {tasks.length} complete</span><span>{pct}%</span></div>
        <div style={st.pbar}><div style={{height:"100%",background:"#fff",borderRadius:"2px",width:pct+"%",transition:"width .4s"}}/></div>
        <div style={st.tasksWrap}>
          {tasks.map(function(task,i){return <TaskRow key={i} task={task} idx={i} isChecked={checked[i]} photoUrl={photos[i]} onToggle={function(){toggle(i);}} onUpload={handlePhotoUpload} uploadingIdx={uploadingIdx}/>; })}
        </div>
        {photoErr?<p style={{fontSize:".75rem",color:"#ef4444",marginBottom:".5rem",textAlign:"center"}}>Photo upload failed — check connection and try again.</p>:null}
        {submitErr?<p style={{fontSize:".75rem",color:"#ef4444",marginBottom:".5rem",textAlign:"center"}}>Submission failed — check connection and try again.</p>:null}
        <button style={Object.assign({},st.btnP,{opacity:(!allDone||submitting)?0.3:1})} disabled={!allDone||submitting} onClick={submitChecklist}>{submitting?"Submitting…":btnLabel}</button>
      </div>
    </div>
  );

  if(view==="success") return (
    <div style={Object.assign({},st.page,st.center)}>
      <div style={Object.assign({},st.card,{textAlign:"center"})}>
        <div style={st.sicon}><CheckBig color="#fff"/></div>
        <h2 style={{fontSize:"1.5rem",fontWeight:"600",marginBottom:".5rem"}}>All done.</h2>
        <p style={{fontSize:".875rem",color:"#555",marginBottom:"2rem"}}>{shift} checklist for {sec} ({loc}) submitted by {name}.</p>
        <button style={st.btnP} onClick={resetHome}>New Checklist</button>
      </div>
    </div>
  );

  if(view==="adminLogin") return (
    <div style={Object.assign({},st.page,st.center)}>
      <div style={st.card}>
        <button style={st.backBtn} onClick={function(){setView("home");setAdminPw("");setAdminErr(false);}}>← Back</button>
        <h2 style={{fontSize:"1.3rem",fontWeight:"600",marginBottom:"1.5rem"}}>Admin Access</h2>
        <input type="password" style={Object.assign({},st.field,{marginBottom:".75rem"})} placeholder="Password" value={adminPw}
          onChange={function(e){setAdminPw(e.target.value);setAdminErr(false);}}
          onKeyDown={function(e){if(e.key==="Enter")tryLogin();}}
        />
        {adminErr?<p style={{fontSize:".75rem",color:"#ef4444",marginBottom:".75rem"}}>Incorrect password.</p>:null}
        <button style={st.btnP} onClick={tryLogin}>Enter</button>
      </div>
    </div>
  );

  if(view==="admin") return (
    <div style={Object.assign({},st.page,st.col)}>
      <div style={st.adminWrap}>
        <div style={st.rowSB}>
          <button style={Object.assign({},st.backBtn,{marginBottom:"0"})} onClick={function(){setView("home");exitSelectMode();}}>← Exit</button>
          <span style={{fontSize:".9rem",fontWeight:"600"}}>Admin</span>
          <div style={{width:"3rem"}}/>
        </div>
        <div style={st.tabRow}>
          <TabBtn label="Submission Log" active={adminTab==="logs"} onClick={function(){setAdminTab("logs");exitSelectMode();}}/>
          <TabBtn label="Results" active={adminTab==="results"} onClick={function(){setAdminTab("results");exitSelectMode();}}/>
          <TabBtn label="Edit Checklists" active={adminTab==="edit"} onClick={function(){setAdminTab("edit");exitSelectMode();}}/>
        </div>

        {adminTab==="results"?<ResultsView logs={logs} logsLoading={logsLoading} logsErr={logsErr} onRefresh={fetchLogs}/>:null}

        {adminTab==="logs"?(
          <div>
            {/* Toolbar */}
            <div style={{display:"flex",gap:".5rem",marginBottom:"1rem",flexWrap:"wrap",alignItems:"center"}}>
              <button style={st.btnDl} onClick={function(){downloadCSV(logs);}} disabled={logs.length===0||deleting}>↓ CSV</button>
              <button style={st.btnG} onClick={fetchLogs} disabled={deleting}>↺ Refresh</button>
              {!selectMode?(
                <button style={logs.length>0?st.btnG:Object.assign({},st.btnG,{opacity:.4,cursor:"not-allowed"})} disabled={logs.length===0||deleting} onClick={function(){setSelectMode(true);}}>Select</button>
              ):(
                <>
                  <button style={st.btnG} onClick={toggleSelectAll}>{selectedIds.length===logs.length?"Deselect all":"Select all"}</button>
                  <button style={selectedIds.length>0?st.btnDanger:Object.assign({},st.btnDanger,{opacity:.4,cursor:"not-allowed"})} disabled={selectedIds.length===0||deleting} onClick={handleDeleteSelected}>
                    {deleting?"Deleting…":"Delete ("+selectedIds.length+")"}
                  </button>
                  <button style={st.btnG} onClick={exitSelectMode}>Cancel</button>
                </>
              )}
              <button style={logs.length>0?Object.assign({},st.btnDanger,{marginLeft:"auto"}):Object.assign({},st.btnDanger,{marginLeft:"auto",opacity:.4,cursor:"not-allowed"})} disabled={logs.length===0||deleting} onClick={handleDeleteAll}>Delete all</button>
            </div>

            {logsLoading?<p style={{fontSize:".875rem",color:"#444",textAlign:"center",padding:"3rem 0"}}>Loading…</p>
            :logsErr?<p style={{fontSize:".875rem",color:"#ef4444",textAlign:"center",padding:"3rem 0"}}>Failed to load. Check connection.</p>
            :logs.length===0?<p style={{fontSize:".875rem",color:"#333",textAlign:"center",padding:"3rem 0"}}>No submissions yet.</p>
            :logs.map(function(log){
              const isSelected=selectedIds.indexOf(log.id)>=0;
              return(
                <div key={log.id} style={Object.assign({},st.logCard,isSelected?st.logCardSelected:{})}>
                  {selectMode?React.createElement("input",{type:"checkbox",style:st.checkbox,checked:isSelected,onChange:function(){toggleSelect(log.id);}}):null}
                  <div style={{flex:"1",cursor:"pointer"}} onClick={function(){selectMode?toggleSelect(log.id):setExpanded(expanded===log.id?null:log.id);}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                      <div>
                        <p style={{fontWeight:"500",fontSize:".875rem"}}>{log.name}</p>
                        <p style={{fontSize:".7rem",color:"#555",marginTop:".2rem"}}>{log.location} · {log.section} · {log.shift}</p>
                      </div>
                      <div style={{textAlign:"right",flexShrink:"0",marginLeft:"1rem"}}>
                        <p style={{fontSize:".7rem",color:"#444"}}>{new Date(log.created_at).toLocaleString("en-AU",{dateStyle:"short",timeStyle:"short"})}</p>
                        <p style={{fontSize:".7rem",fontWeight:"500",marginTop:".2rem",color:log.completed===log.total?"#4ade80":"#f59e0b"}}>{log.completed}/{log.total}</p>
                      </div>
                    </div>
                    {!selectMode&&expanded===log.id?(
                      <div style={st.logExpand}>
                        {(log.tasks||[]).map(function(t,i){return(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:".5rem",fontSize:".75rem",marginBottom:".375rem",color:t.done?"#444":"#f59e0b"}}>
                            <span>{t.done?"✓":"○"}</span>
                            <span style={t.done?{textDecoration:"line-through"}:{}}>{t.task}</span>
                            {t.photoUrl?<a href={t.photoUrl} target="_blank" rel="noreferrer" style={{color:"#60a5fa",marginLeft:"auto",flexShrink:"0"}}>📷 view</a>:null}
                          </div>
                        );})}
                      </div>
                    ):null}
                  </div>
                </div>
              );
            })}
          </div>
        ):null}

        {adminTab==="edit"?(
          <div>
            <p style={{fontSize:".7rem",color:"#555",marginBottom:"1rem"}}>Tap 📷 on a task to require a photo. Changes save instantly to all devices.{configSaving?" Saving…":""}</p>
            <div style={st.chipRow}>{LOCS.map(function(l){return <Chip key={l} label={l} active={eLoc===l} onClick={function(){setELoc(l);setESec(STRUCTURE[l][0]);}}/>; })}</div>
            <div style={st.chipRow}>{eSections.map(function(sc){return <Chip key={sc} label={sc} active={eSec===sc} onClick={function(){setESec(sc);}}/>; })}</div>
            <div style={Object.assign({},st.chipRow,{marginBottom:"1rem"})}>{SHIFTS.map(function(sh){return <Chip key={sh} label={sh} active={eShift===sh} onClick={function(){setEShift(sh);}}/>; })}</div>
            <div style={{marginBottom:".75rem"}}>
              {eTasks.map(function(task,i){return <EditTaskRow key={i} task={task} idx={i}
                onUpdateText={function(idx,text){updateTaskText(eLoc,eSec,eShift,idx,text);}}
                onTogglePhoto={function(idx){toggleTaskPhoto(eLoc,eSec,eShift,idx);}}
                onRemove={function(idx){removeTask(eLoc,eSec,eShift,idx);}}
              />; })}
            </div>
            <button style={st.addBtn} onClick={function(){addTask(eLoc,eSec,eShift);}}>+ Add task</button>
          </div>
        ):null}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("sw.js");
    });
  }
</script>
</body>
</html>
