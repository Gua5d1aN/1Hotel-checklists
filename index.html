function deepClone(o){return JSON.parse(JSON.stringify(o));}
function migrate(cl){
  const u=deepClone(cl);
  LOCS.forEach(function(l){
    if(!u[l]) u[l]={};
    if(!u[l]._sections) u[l]._sections=deepClone(STRUCTURE[l]);
    u[l]._sections.forEach(function(sc){
      if(!u[l][sc]) u[l][sc]={};
      if(!u[l][sc]._enabled) u[l][sc]._enabled=deepClone(DEFAULT_ENABLED);
      SHIFTS.forEach(function(sh){
        if(!u[l][sc][sh]) u[l][sc][sh]=[];
        u[l][sc][sh]=u[l][sc][sh].map(function(t){return typeof t==="string"?{text:t,requiresPhoto:false}:t;});
        if(u[l][sc]._enabled[sh]===undefined) u[l][sc]._enabled[sh]=DEFAULT_ENABLED[sh]||false;
      });
    });
  });
  return u;
}

  const data=await res.json();
  return data.length>0?migrate(data[0].config):null;
}

function toCSV(rows){
  const h=["ID","Submitted At","Name","Location","Section","Shift","Completed","Total","Tasks"];
  const lines=rows.map(function(r){return[r.id,r.created_at,r.name,r.location,r.section,r.shift,r.completed,r.total,JSON.stringify(r.tasks)].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(",");});
  return[h.join(",")].concat(lines).join("\n");
}
function downloadCSV(rows){
  const blob=new Blob([toCSV(rows)],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="checklist_logs_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  URL.revokeObjectURL(url);
}

function groupLogsByDate(logs){
  const groups={};const keys=[];
  logs.forEach(function(log){
    const d=new Date(log.created_at),now=new Date(),y=new Date(now);
    y.setDate(y.getDate()-1);
    let dk;
    if(d.toDateString()===now.toDateString()) dk="Today \u2014 "+d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});
    else if(d.toDateString()===y.toDateString()) dk="Yesterday \u2014 "+d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});
    else dk=d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
    if(!groups[dk]){groups[dk]={};keys.push(dk);}
    if(!groups[dk][log.location]) groups[dk][log.location]=[];
    groups[dk][log.location].push(log);
  });
  return {groups,keys};
}
function groupIssuesByDate(issues){
  const groups={};const keys=[];
  issues.forEach(function(issue){
    const d=new Date(issue.created_at),now=new Date(),y=new Date(now);
    y.setDate(y.getDate()-1);
    let dk;
    if(d.toDateString()===now.toDateString()) dk="Today \u2014 "+d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});
    else if(d.toDateString()===y.toDateString()) dk="Yesterday \u2014 "+d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});
    else dk=d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
    if(!groups[dk]){groups[dk]=[];keys.push(dk);}
    groups[dk].push(issue);
  });
  return {groups,keys};
}

function ResultsView({logs,logsLoading,logsErr,onRefresh}){
  const [filterLoc,setFilterLoc]=useState("All");
  const [filterShift,setFilterShift]=useState("All");
  const [filterDate,setFilterDate]=useState("Last 7 days");
  const dateOpts=["All","Today","Last 7 days","Last 30 days"];
  function withinDate(log){
    if(filterDate==="All") return true;
    const d=new Date(log.created_at),now=new Date();
    if(filterDate==="Today") return d.toDateString()===now.toDateString();
    if(filterDate==="Last 7 days") return (now-d)<7*86400000;
    if(filterDate==="Last 30 days") return (now-d)<30*86400000;
    return true;
  }
  const filtered=logs.filter(function(l){return(filterLoc==="All"||l.location===filterLoc)&&(filterShift==="All"||l.shift===filterShift)&&withinDate(l);});
  const total=filtered.length;
  const fullyComplete=filtered.filter(function(l){return l.completed===l.total;}).length;
  const incomplete=total-fullyComplete;
  const compRate=total?Math.round(fullyComplete/total*100):0;
  const bySec={};
  filtered.forEach(function(l){const k=l.location+" \u00b7 "+l.section;if(!bySec[k])bySec[k]={done:0,total:0};bySec[k].total++;if(l.completed===l.total)bySec[k].done++;});
  const missedTasks={};
  filtered.forEach(function(l){(l.tasks||[]).forEach(function(t){if(!t.done)missedTasks[t.task]=(missedTasks[t.task]||0)+1;});});
  const topMissed=Object.entries(missedTasks).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  const filterStyle={background:C.surface,boxShadow:SH.upSm,border:"none",borderRadius:"10px",padding:"0.45rem 0.75rem",fontSize:"0.7rem",fontWeight:500,color:C.t3,cursor:"pointer",fontFamily:"inherit",transition:"all 0.18s"};
  const filterActiveStyle=Object.assign({},filterStyle,{background:C.teal,color:"#0C0A22",fontWeight:600,boxShadow:SH.teal});
  if(logsLoading) return <p style={{textAlign:"center",padding:"3rem 0",color:C.t4,fontSize:"0.875rem"}}>Loading…</p>;
  if(logsErr) return <p style={{textAlign:"center",padding:"3rem 0",color:C.pink,fontSize:"0.875rem"}}>Failed to load.</p>;
  return <div>
    <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.5rem",flexWrap:"wrap",alignItems:"center"}}>
      <ActionBtn onClick={onRefresh} variant="teal">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 1 0 1.5-3.5" stroke={C.teal} strokeWidth="1.5" strokeLinecap="round"/><path d="M3 4.5V8h3.5" stroke={C.teal} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        Refresh
      </ActionBtn>
      <select value={filterLoc} onChange={function(e){setFilterLoc(e.target.value);}} style={{background:C.surface,boxShadow:SH.upSm,border:"none",borderRadius:"10px",padding:"0.45rem 0.75rem",fontSize:"0.7rem",color:C.t3,fontFamily:"inherit",outline:"none"}}>
        <option>All</option>{LOCS.map(function(l){return <option key={l}>{l}</option>;})}
      </select>
      <select value={filterShift} onChange={function(e){setFilterShift(e.target.value);}} style={{background:C.surface,boxShadow:SH.upSm,border:"none",borderRadius:"10px",padding:"0.45rem 0.75rem",fontSize:"0.7rem",color:C.t3,fontFamily:"inherit",outline:"none"}}>
        <option>All</option>{SHIFTS.map(function(s){return <option key={s}>{s}</option>;})}
      </select>
      <select value={filterDate} onChange={function(e){setFilterDate(e.target.value);}} style={{background:C.surface,boxShadow:SH.upSm,border:"none",borderRadius:"10px",padding:"0.45rem 0.75rem",fontSize:"0.7rem",color:C.t3,fontFamily:"inherit",outline:"none"}}>
        {dateOpts.map(function(d){return <option key={d}>{d}</option>;})}
      </select>
    </div>
    {total===0
      ?<p style={{textAlign:"center",padding:"3rem 0",color:C.t4,fontSize:"0.875rem"}}>No submissions match filters.</p>
      :<div>
        <div style={{display:"flex",gap:"0.625rem",marginBottom:"1.75rem"}}>
          {[{v:total,l:"Submissions",c:C.t1},{v:compRate+"%",l:"Completion",c:C.teal},{v:incomplete,l:"Incomplete",c:incomplete>0?C.amber:C.teal}].map(function(s,i){
            return <div key={i} style={{flex:1,background:C.surface,borderRadius:"16px",boxShadow:SH.upMd,padding:"1rem 0.875rem",textAlign:"center"}}>
              <div style={{fontSize:"1.75rem",fontWeight:700,color:s.c,letterSpacing:"-0.03em",lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.t4,marginTop:"0.4rem"}}>{s.l}</div>
            </div>;
          })}
        </div>
        <SecLbl>Completion by section</SecLbl>
        <div style={{marginBottom:"1.5rem"}}>
          {Object.entries(bySec).sort(function(a,b){return a[0].localeCompare(b[0]);}).map(function(entry){
            const k=entry[0],v=entry[1],pct=Math.round(v.done/v.total*100);
            const bc=pct===100?C.teal:pct>=50?C.amber:C.pink;
            return <div key={k} style={{marginBottom:"0.75rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.35rem"}}>
                <span style={{fontSize:"0.78rem",color:C.t2}}>{k}</span>
                <span style={{fontSize:"0.72rem",fontWeight:600,color:bc}}>{pct}%</span>
              </div>
              <div style={{background:C.well,boxShadow:SH.downSm,borderRadius:"100px",height:"6px",overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:"100px",width:pct+"%",background:bc,transition:"width 0.4s"}}/>
              </div>
            </div>;
          })}
        </div>
        {topMissed.length>0&&<div>
          <SecLbl>Most missed tasks</SecLbl>
          {topMissed.map(function(entry,i){
            const rankColors=[C.pink,C.amber,C.t3,C.t4,C.t4];
            const rc=rankColors[i]||C.t4;
            return <div key={i} style={{background:C.surface,boxShadow:SH.upSm,borderRadius:"12px",padding:"0.75rem 1rem",marginBottom:"0.5rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
                <div style={{width:"22px",height:"22px",borderRadius:"6px",background:"rgba("+( i===0?"232,41,122":i===1?"196,128,58":"122,114,160")+",0.12)",border:"1px solid rgba("+(i===0?"232,41,122":i===1?"196,128,58":"122,114,160")+",0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"0.65rem",fontWeight:700,color:rc}}>{i+1}</div>
                <span style={{fontSize:"0.75rem",color:C.t2}}>{entry[0]}</span>
              </div>
              <span style={{fontSize:"0.68rem",fontWeight:600,color:rc,flexShrink:0,marginLeft:"0.5rem"}}>{entry[1]}× missed</span>
            </div>;
          })}
        </div>}
      </div>
    }
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("loading");
  const [name,setName]=useState("");
  const [loc,setLoc]=useState("");
  const [sec,setSec]=useState("");
  const [shift,setShift]=useState("");
  const [tasks,setTasks]=useState([]);
  const [checked,setChecked]=useState([]);
  const [photos,setPhotos]=useState([]);
  const [uploadingIdx,setUploadingIdx]=useState(-1);
  const [photoErr,setPhotoErr]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [submitErr,setSubmitErr]=useState(false);
  const [cls,setCls]=useState(null);
  const [configSaving,setConfigSaving]=useState(false);
  const [logs,setLogs]=useState([]);
  const [logsLoading,setLogsLoading]=useState(false);
  const [logsErr,setLogsErr]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [selectedIds,setSelectedIds]=useState([]);
  const [selectMode,setSelectMode]=useState(false);
  const [adminPw,setAdminPw]=useState("");
  const [adminErr,setAdminErr]=useState(false);
  const [adminTab,setAdminTab]=useState("logs");
  const [eLoc,setELoc]=useState("Kitchen");
  const [eSec,setESec]=useState("Grill");
  const [eShift,setEShift]=useState("Opening");
  const [expanded,setExpanded]=useState(null);
  const [issueName,setIssueName]=useState("");
  const [issueItem,setIssueItem]=useState("");
  const [issuePhoto,setIssuePhoto]=useState(null);
  const [issuePhotoUrl,setIssuePhotoUrl]=useState(null);
  const [issueUploading,setIssueUploading]=useState(false);
  const [issueSubmitting,setIssueSubmitting]=useState(false);
  const [issueErr,setIssueErr]=useState("");
  const [issues,setIssues]=useState([]);
  const [issuesLoading,setIssuesLoading]=useState(false);
  const [issuesErr,setIssuesErr]=useState(false);
  const [issueFilterDate,setIssueFilterDate]=useState("All");
  const [issueFilterName,setIssueFilterName]=useState("");
  const [newSecName,setNewSecName]=useState("");

  useEffect(function(){
    sbFetchConfig().then(function(config){setCls(config||deepClone(DT));setView("welcome");}).catch(function(){setCls(deepClone(DT));setView("welcome");});
  },[]);

  const saveCls=function(u){setCls(u);setConfigSaving(true);sbSaveConfig(u).finally(function(){setConfigSaving(false);});};
  const fetchLogs=useCallback(async function(){
    setLogsLoading(true);setLogsErr(false);
    try{setLogs(await sbFetchLogs());}catch(e){setLogsErr(true);}
    setLogsLoading(false);
  },[]);
  const fetchIssues=useCallback(async function(){
    setIssuesLoading(true);setIssuesErr(false);
    try{setIssues(await sbFetchIssues());}catch(e){setIssuesErr(true);}
    setIssuesLoading(false);
  },[]);
  useEffect(function(){if(view==="admin"&&(adminTab==="logs"||adminTab==="results"))fetchLogs();},[view,adminTab,fetchLogs]);
  useEffect(function(){if(view==="admin"&&adminTab==="issues")fetchIssues();},[view,adminTab,fetchIssues]);

  const resetIssueForm=function(){setIssueName("");setIssueItem("");setIssuePhoto(null);setIssuePhotoUrl(null);setIssueErr("");};
  const handleIssuePhotoUpload=async function(file){
    setIssueUploading(true);setIssueErr("");
    try{
      const ext=file.name.split(".").pop()||"jpg";
      const path="issues/"+Date.now()+"_"+issueItem.replace(/[^a-zA-Z0-9]/g,"_")+"."+ext;
      const url=await uploadPhoto(file,path);
      setIssuePhoto(file);setIssuePhotoUrl(url);
    }catch(e){setIssueErr("Photo upload failed. Try again.");}
    setIssueUploading(false);
  };
  const submitIssue=async function(){
    if(!issueName.trim()||!issueItem.trim()||!issuePhotoUrl){setIssueErr("Please fill all fields and add a photo.");return;}
    setIssueSubmitting(true);setIssueErr("");
    try{
      await sbInsertIssue({name:issueName.trim(),item_name:issueItem.trim(),photo_url:issuePhotoUrl});
      setView("issueSuccess");
    }catch(e){setIssueErr("Submission failed. Check connection.");}
    setIssueSubmitting(false);
  };
  const handleDeleteSelected=async function(){
    if(!selectedIds.length) return;
    if(!window.confirm("Delete "+selectedIds.length+" selected submission"+(selectedIds.length!==1?"s":"")+"? This cannot be undone.")) return;
    setDeleting(true);
    try{
      await sbDeleteIds(selectedIds);
      setLogs(function(prev){return prev.filter(function(l){return selectedIds.indexOf(l.id)<0;});});
      setSelectedIds([]);setSelectMode(false);
    }catch(e){alert("Delete failed. Please try again.");}
    setDeleting(false);
  };
  const handleDeleteAll=async function(){
    if(!window.confirm("Delete ALL "+logs.length+" submissions? This cannot be undone.")) return;
    setDeleting(true);
    try{
      await sbDeleteAll();
      setLogs([]);setSelectedIds([]);setSelectMode(false);
    }catch(e){alert("Delete failed. Please try again.");}
    setDeleting(false);
  };
  const toggleSelect=function(id){setSelectedIds(function(prev){return prev.indexOf(id)>=0?prev.filter(function(x){return x!==id;}):[].concat(prev,[id]);});};
  const toggleSelectAll=function(){setSelectedIds(function(prev){return prev.length===logs.length?[]:[].concat(logs.map(function(l){return l.id;}));});};
  const exitSelectMode=function(){setSelectMode(false);setSelectedIds([]);};

  const taskDone=function(i){return checked[i]&&(!tasks[i]||!tasks[i].requiresPhoto||!!photos[i]);};
  const completed=tasks.filter(function(_,i){return taskDone(i);}).length;
  const pct=tasks.length?Math.round(completed/tasks.length*100):0;
  const allDone=tasks.length>0&&completed===tasks.length;
  const incomplete=tasks.length-completed;

  const resetHome=function(){setLoc("");setSec("");setShift("");setName("");setSubmitErr(false);setPhotoErr(false);setView("welcome");};
  const startChecklist=function(){
    const t=cls[loc]&&cls[loc][sec]&&cls[loc][sec][shift]?cls[loc][sec][shift]:[];
    setTasks(t);setChecked(new Array(t.length).fill(false));setPhotos(new Array(t.length).fill(null));
    setSubmitErr(false);setPhotoErr(false);setView("checklist");
  };
  const toggle=function(i){setChecked(function(prev){return prev.map(function(v,idx){return idx===i?!v:v;});});};
  const handlePhotoUpload=async function(file,idx){
    setUploadingIdx(idx);setPhotoErr(false);
    try{
      const ext=file.name.split(".").pop()||"jpg";
      const path=[Date.now(),loc,sec,shift,idx].join("_").replace(/[^a-zA-Z0-9_]/g,"_")+"."+ext;
      const url=await uploadPhoto(file,path);
      setPhotos(function(prev){return prev.map(function(p,i){return i===idx?url:p;});});
    }catch(e){setPhotoErr(true);}
    setUploadingIdx(-1);
  };
  const submitChecklist=async function(){
    setSubmitting(true);setSubmitErr(false);
    try{
      await sbInsert({name:name.trim(),location:loc,section:sec,shift:shift,completed:completed,total:tasks.length,
        tasks:tasks.map(function(t,i){return{task:t.text,done:checked[i],requiresPhoto:t.requiresPhoto,photoUrl:photos[i]||null};})
      });
      setView("success");
    }catch(e){setSubmitErr(true);}
    setSubmitting(false);
  };
  const tryLogin=function(){
    if(adminPw===ADMIN_PW){setView("admin");setAdminPw("");setAdminErr(false);}else setAdminErr(true);
  };
  const updateTaskText=function(l,sc,sh,i,text){const u=deepClone(cls);u[l][sc][sh][i]=Object.assign({},u[l][sc][sh][i],{text:text});saveCls(u);};
  const toggleTaskPhoto=function(l,sc,sh,i){const u=deepClone(cls);u[l][sc][sh][i]=Object.assign({},u[l][sc][sh][i],{requiresPhoto:!u[l][sc][sh][i].requiresPhoto});saveCls(u);};

        <div style={{maxWidth:"640px",width:"100%",margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.75rem"}}>
            <button style={{background:"none",border:"none",color:C.t4,fontSize:"0.8rem",cursor:"pointer",padding:0,fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}} onClick={function(){setView("welcome");exitSelectMode();}}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8l4 4" stroke={C.t4} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Exit
            </button>
            <Wordmark/>
            <div style={{fontSize:"0.65rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.t4}}>Admin</div>
          </div>

          <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.5rem",overflowX:"auto",paddingBottom:"0.25rem"}}>
            {[["logs","Submission Log"],["results","Results"],["issues","Issue Log"],["edit","Edit Checklists"]].map(function(tab){
              return <TabBtn key={tab[0]} label={tab[1]} active={adminTab===tab[0]} onClick={function(){setAdminTab(tab[0]);exitSelectMode();}}/>;
            })}
          </div>

          {adminTab==="results"&&<ResultsView logs={logs} logsLoading={logsLoading} logsErr={logsErr} onRefresh={fetchLogs}/>}

          {adminTab==="logs"&&<div>
            <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.25rem",flexWrap:"wrap",alignItems:"center"}}>
              <ActionBtn onClick={function(){downloadCSV(logs);}} disabled={logs.length===0||deleting} variant="teal">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M8 3v8M4 9l4 4 4-4" stroke={C.teal} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                CSV
              </ActionBtn>
              <ActionBtn onClick={fetchLogs} disabled={deleting}>
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 1 0 1.5-3.5" stroke={C.t3} strokeWidth="1.5" strokeLinecap="round"/><path d="M3 4.5V8h3.5" stroke={C.t3} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Refresh
              </ActionBtn>
              {!selectMode
                ?<ActionBtn onClick={function(){setSelectMode(true);}} disabled={logs.length===0||deleting}>Select</ActionBtn>
                :<>
                  <ActionBtn onClick={toggleSelectAll}>{selectedIds.length===logs.length?"Deselect all":"Select all"}</ActionBtn>
                  <ActionBtn onClick={handleDeleteSelected} disabled={selectedIds.length===0||deleting} variant="danger">
                    {deleting?"Deleting…":"Delete ("+selectedIds.length+")"}
                  </ActionBtn>
                  <ActionBtn onClick={exitSelectMode}>Cancel</ActionBtn>
                </>
              }
              <div style={{marginLeft:"auto"}}>
                <ActionBtn onClick={handleDeleteAll} disabled={logs.length===0||deleting} variant="danger">Delete all</ActionBtn>
              </div>
            </div>
            {logsLoading&&<p style={{textAlign:"center",padding:"3rem 0",color:C.t4,fontSize:"0.875rem"}}>Loading…</p>}
            {logsErr&&<p style={{textAlign:"center",padding:"3rem 0",color:C.pink,fontSize:"0.875rem"}}>Failed to load. Check connection.</p>}
            {!logsLoading&&!logsErr&&logs.length===0&&<p style={{textAlign:"center",padding:"3rem 0",color:C.t4,fontSize:"0.875rem"}}>No submissions yet.</p>}
            {!logsLoading&&!logsErr&&logs.length>0&&logKeys.map(function(dk){
              const dateGroup=logGroups[dk];
              const totalInDate=Object.values(dateGroup).reduce(function(a,arr){return a+arr.length;},0);
              return <div key={dk}>
                <DateHdr label={dk} count={totalInDate}/>
                {Object.keys(dateGroup).map(function(locationKey){
                  return <div key={locationKey}>
                    <div style={{fontSize:"0.58rem",fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:C.t4,marginBottom:"0.5rem",marginTop:"0.875rem",display:"flex",alignItems:"center",gap:"0.4rem"}}>
                      <div style={{width:"3px",height:"3px",background:C.t4,borderRadius:"50%",flexShrink:0}}/>
                      {locationKey}
                    </div>
                    {dateGroup[locationKey].map(function(log){
                      const isSelected=selectedIds.indexOf(log.id)>=0;
                      const scoreColor=log.completed===log.total?C.teal:C.amber;
                      return <div key={log.id} style={{background:isSelected?"rgba(232,41,122,0.08)":C.surface,boxShadow:isSelected?"5px 5px 12px rgba(0,0,0,0.55),-3px -3px 8px rgba(85,65,185,0.2),inset 0 0 0 1.5px rgba(232,41,122,0.3)":SH.upMd,borderRadius:"14px",padding:"0.875rem 1rem",marginBottom:"0.5rem",display:"flex",alignItems:"flex-start",gap:"0.75rem",cursor:"pointer",transition:"all 0.18s"}}
                        onClick={function(){selectMode?toggleSelect(log.id):setExpanded(expanded===log.id?null:log.id);}}>
                        {selectMode&&<input type="checkbox" checked={isSelected} onChange={function(){toggleSelect(log.id);}} style={{width:"1.1rem",height:"1.1rem",accentColor:C.teal,cursor:"pointer",flexShrink:0,marginTop:"0.15rem"}}/>}
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                            <div>
                              <p style={{fontWeight:500,fontSize:"0.875rem",color:C.t1,marginBottom:"0.15rem"}}>{log.name}</p>
                              <p style={{fontSize:"0.68rem",color:C.t3}}>{log.section} \u00b7 {log.shift}</p>
                            </div>
                            <div style={{textAlign:"right",flexShrink:0,marginLeft:"1rem"}}>
                              <p style={{fontSize:"0.63rem",color:C.t4,marginBottom:"0.2rem"}}>{new Date(log.created_at).toLocaleString("en-AU",{hour:"2-digit",minute:"2-digit"})}</p>
                              <p style={{fontSize:"0.75rem",fontWeight:600,color:scoreColor}}>{log.completed}/{log.total}</p>
                            </div>
                          </div>
                          {!selectMode&&expanded===log.id&&<div style={{marginTop:"0.7rem",paddingTop:"0.7rem",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                            {(log.tasks||[]).map(function(t,i){return(
                              <div key={i} style={{display:"flex",alignItems:"center",gap:"0.5rem",fontSize:"0.7rem",marginBottom:"0.3rem",color:t.done?C.t4:C.amber}}>
                                <svg width="10" height="10" viewBox="0 0 14 14" fill="none">{t.done?<path d="M2 7l3.5 3.5L12 4" stroke={C.teal} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/>:<circle cx="7" cy="7" r="3" stroke={C.amber} strokeWidth="1.25"/>}</svg>
                                <span style={t.done?{textDecoration:"line-through"}:{}}>{t.task}</span>
                                {t.photoUrl&&<a href={t.photoUrl} target="_blank" rel="noreferrer" style={{color:C.teal,marginLeft:"auto",flexShrink:0,fontSize:"0.63rem"}}>📷 view</a>}
                              </div>
                            );})}
                          </div>}
                        </div>
                      </div>;
                    })}
                  </div>;
                })}
              </div>;
            })}
          </div>}

          {adminTab==="issues"&&<div>
            <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.25rem",flexWrap:"wrap",alignItems:"center"}}>
              <input value={issueFilterName} onChange={function(e){setIssueFilterName(e.target.value);}} placeholder="Filter by name…" style={{flex:1,minWidth:"120px",background:C.well,boxShadow:SH.downSm,border:"none",borderRadius:"10px",padding:"0.5rem 0.75rem",color:C.t1,fontSize:"0.72rem",fontFamily:"inherit",outline:"none"}}/>
              <select value={issueFilterDate} onChange={function(e){setIssueFilterDate(e.target.value);}} style={{background:C.surface,boxShadow:SH.upSm,border:"none",borderRadius:"10px",padding:"0.45rem 0.75rem",fontSize:"0.7rem",color:C.t3,fontFamily:"inherit",outline:"none"}}>
                {["All","Today","Last 7 days","Last 30 days"].map(function(d){return <option key={d}>{d}</option>;})}
              </select>
              <ActionBtn onClick={fetchIssues} disabled={issuesLoading} variant="teal">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 1 0 1.5-3.5" stroke={C.teal} strokeWidth="1.5" strokeLinecap="round"/><path d="M3 4.5V8h3.5" stroke={C.teal} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </ActionBtn>
            </div>
            {issuesLoading&&<p style={{textAlign:"center",padding:"3rem 0",color:C.t4,fontSize:"0.875rem"}}>Loading…</p>}
            {issuesErr&&<p style={{textAlign:"center",padding:"3rem 0",color:C.pink,fontSize:"0.875rem"}}>Failed to load.</p>}
            {!issuesLoading&&!issuesErr&&issueKeys.length===0&&<p style={{textAlign:"center",padding:"3rem 0",color:C.t4,fontSize:"0.875rem"}}>No issues match filters.</p>}
            {!issuesLoading&&!issuesErr&&issueKeys.map(function(dk){
              return <div key={dk}>
                <DateHdr label={dk} count={issueGroups[dk].length}/>
                {issueGroups[dk].map(function(issue){
                  return <div key={issue.id} className="nm-card" onClick={function(){setExpanded(expanded===issue.id?null:issue.id);}} style={{background:C.surface,boxShadow:SH.upMd,borderRadius:"14px",padding:"0.875rem 1rem",marginBottom:"0.625rem",cursor:"pointer",border:expanded===issue.id?"1px solid rgba(196,128,58,0.25)":"none",transition:"all 0.18s",overflow:"hidden"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
                      <div style={{width:"38px",height:"38px",borderRadius:"10px",background:"rgba(196,128,58,0.12)",boxShadow:SH.upSm,border:"1px solid rgba(196,128,58,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10.5 2.5a2.5 2.5 0 0 1 0 5L5 13a1.5 1.5 0 0 1-2-2l5.5-5.5a2.5 2.5 0 0 1 2-3z" stroke={C.amber} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><circle cx="11" cy="5" r="1" fill={C.amber}/></svg>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"0.875rem",fontWeight:500,color:C.t1,marginBottom:"0.15rem"}}>{issue.item_name}</div>
                        <div style={{fontSize:"0.68rem",color:C.t3}}>Logged by {issue.name}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:"0.63rem",color:C.t4}}>{new Date(issue.created_at).toLocaleString("en-AU",{hour:"2-digit",minute:"2-digit"})}</div>
                        {issue.photo_url&&<div style={{width:"46px",height:"46px",borderRadius:"8px",marginTop:"0.35rem",background:C.well,boxShadow:SH.downSm,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="5" width="12" height="8" rx="1.5" stroke={C.amber} strokeWidth="1.25"/><circle cx="8" cy="9" r="2" stroke={C.amber} strokeWidth="1.25"/><path d="M6 5l1-2h2l1 2" stroke={C.amber} strokeWidth="1.25" strokeLinejoin="round"/></svg>
                        </div>}
                      </div>
                    </div>
                    {expanded===issue.id&&issue.photo_url&&<div style={{marginTop:"0.875rem",paddingTop:"0.875rem",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                      <a href={issue.photo_url} target="_blank" rel="noreferrer" style={{display:"block",borderRadius:"12px",overflow:"hidden",border:"1px solid rgba(196,128,58,0.2)"}}>
                        <img src={issue.photo_url} alt={issue.item_name} style={{width:"100%",display:"block",objectFit:"cover",maxHeight:"200px"}}/>
                      </a>
                      <div style={{display:"flex",justifyContent:"flex-end",marginTop:"0.625rem"}}>
                        <a href={issue.photo_url} target="_blank" rel="noreferrer" style={{fontSize:"0.68rem",color:C.teal,textDecoration:"none",border:"1px solid rgba(13,216,196,0.25)",borderRadius:"8px",padding:"0.35rem 0.75rem"}}>View full photo →</a>
                      </div>
                    </div>}
                  </div>;
                })}
              </div>;
            })}
          </div>}

          {adminTab==="edit"&&<div>
            <div style={{fontSize:"0.7rem",color:C.t4,marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:"0.5rem"}}>
              <div style={{width:"6px",height:"6px",borderRadius:"50%",background:configSaving?"#C4803A":C.teal,boxShadow:configSaving?"0 0 5px rgba(196,128,58,0.5)":"0 0 5px rgba(13,216,196,0.5)"}}/>
              {configSaving?"Saving…":"Changes save instantly to all devices"}
            </div>

            <SecLbl>Location</SecLbl>
            <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"1.25rem"}}>
              {LOCS.map(function(l){return <Chip key={l} label={l} active={eLoc===l} onClick={function(){setELoc(l);const secs=getSections(l);setESec(secs.length>0?secs[0]:"");setNewSecName("");}}/>;  })}
            </div>

            <SecLbl>Section</SecLbl>
            <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"1.25rem"}}>
              {eSections.map(function(sc){
                return <div key={sc} style={{display:"flex",alignItems:"center",background:eSec===sc?C.teal:C.surface,boxShadow:eSec===sc?SH.teal:SH.upSm,borderRadius:"10px",overflow:"hidden",transition:"all 0.18s"}}>
                  <button onClick={function(){setESec(sc);}} style={{background:"none",border:"none",padding:"0.5rem 0.75rem",fontSize:"0.72rem",fontWeight:eSec===sc?600:500,color:eSec===sc?"#0C0A22":C.t3,cursor:"pointer",fontFamily:"inherit"}}>{sc}</button>
                  {eSections.length>1&&<button onClick={function(e){e.stopPropagation();removeSection(eLoc,sc);}} style={{background:"none",border:"none",borderLeft:"1px solid "+(eSec===sc?"rgba(0,0,0,0.15)":"rgba(255,255,255,0.05)"),padding:"0.5rem 0.5rem",fontSize:"0.75rem",color:eSec===sc?"rgba(0,0,0,0.5)":C.t4,cursor:"pointer",fontFamily:"inherit",lineHeight:1}}>×</button>}
                </div>;
              })}
              <div style={{display:"flex",gap:"0.5rem",alignItems:"center"}}>
                <input value={newSecName} onChange={function(e){setNewSecName(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&newSecName.trim()){addSection(eLoc,newSecName);setNewSecName("");}}} placeholder="New section…" style={{background:C.well,boxShadow:SH.downSm,border:"none",borderRadius:"10px",padding:"0.5rem 0.75rem",fontSize:"0.72rem",color:C.t1,fontFamily:"inherit",outline:"none",width:"120px"}}/>
                <button onClick={function(){if(newSecName.trim()){addSection(eLoc,newSecName);setNewSecName("");}}} style={{background:C.surface,boxShadow:SH.upSm,border:"none",borderRadius:"10px",padding:"0.5rem 0.75rem",fontSize:"0.72rem",color:C.t3,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ Add</button>
              </div>
            </div>

            {eSec&&<div>
              <SecLbl>Active shifts — {eSec}</SecLbl>
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.5rem",marginBottom:"1.25rem"}}>
                {SHIFTS.map(function(sh){
                  const on=eEnabled[sh]!==false;
                  return <button key={sh} onClick={function(){toggleShiftEnabled(eLoc,eSec,sh);}} style={{background:on?C.teal:C.surface,boxShadow:on?SH.teal:SH.upSm,border:"none",borderRadius:"8px",padding:"0.4rem 0.625rem",fontSize:"0.65rem",fontWeight:on?600:500,color:on?"#0C0A22":C.t3,cursor:"pointer",fontFamily:"inherit",transition:"all 0.18s"}}>{sh}</button>;
                })}
              </div>

              <SecLbl>Tasks</SecLbl>
              <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"1rem"}}>
                {SHIFTS.map(function(sh){return <Chip key={sh} label={sh} active={eShift===sh} onClick={function(){setEShift(sh);}}/>;  })}
              </div>
              <div style={{marginBottom:"0.75rem"}}>
                {eTasks.map(function(task,i){return <EditTaskRow key={i} task={task} idx={i}
                  onUpdateText={function(idx,text){updateTaskText(eLoc,eSec,eShift,idx,text);}}
                  onTogglePhoto={function(idx){toggleTaskPhoto(eLoc,eSec,eShift,idx);}}
                  onSetExample={function(idx,url){setTaskExamplePhoto(eLoc,eSec,eShift,idx,url);}}
                  onRemove={function(idx){removeTask(eLoc,eSec,eShift,idx);}}
                />;  })}
              </div>
              <button onClick={function(){addTask(eLoc,eSec,eShift);}} style={{width:"100%",background:"transparent",border:"1px dashed #2A2648",borderRadius:"14px",padding:"0.875rem",fontSize:"0.8rem",color:C.t4,cursor:"pointer",fontFamily:"inherit",transition:"all 0.18s"}}>+ Add task</button>
            </div>}
          </div>}

        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
<script>
  if("serviceWorker"in navigator){
    window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js");});
  }
</script>
</body>
</html>
